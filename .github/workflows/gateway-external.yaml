on:
  push:
    branches:
      - master
    paths:
      - backend/gateway-external/**
      # gateway-external vendors no deps; it builds against service-go's exported
      # pkg/* types via `replace`, so a change to those must rebuild this image.
      - backend/service-go/services/*/pkg/**

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/samudai/gateway-external
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          # Context is backend/ (not the service dir) so the sibling service-go
          # module is available to the `replace` directive at build time.
          context: backend
          file: backend/gateway-external/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            ghcr.io/samudai/gateway-external:${{ github.sha }}
            ghcr.io/samudai/gateway-external:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
