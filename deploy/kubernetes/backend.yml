kind: ConfigMap
apiVersion: v1
metadata:
  name: backend
  labels:
    app: backend
data:
  # Per-module Postgres connections (each former service owned its own database).
  pg-url-dao: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/dao?sslmode=disable
  pg-url-member: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/member?sslmode=disable
  pg-url-point: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/point?sslmode=disable
  pg-url-project: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/project?sslmode=disable
  pg-url-dashboard: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/dashboard?sslmode=disable
  pg-url-discovery: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/discovery?sslmode=disable
  pg-url-discussion: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/discussion?sslmode=disable
  pg-url-job: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/job?sslmode=disable
  # Shared Mongo client (modules pick their own DB by name) + Redis.
  mongo-database-url: mongodb://$(MONGO_INITDB_ROOT_USERNAME):$(MONGO_INITDB_ROOT_PASSWORD)@mongodb-service.default.svc.cluster.local:27017/default?authSource=admin
  redis-database-url: redis://:$(REDIS_PASSWORD)@redis-service.default.svc.cluster.local:6379
  mq-ip: rabbitmq-service.default.svc.cluster.local
  mq-username: $(RABBITMQ_DEFAULT_USER)
  mq-password: $(RABBITMQ_DEFAULT_PASS)
  github-webhook-secret: secretproduction
  discord-client-id: <discord-client-id>
  discord-client-secret: <discord-client-secret>
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
  annotations:
    prometheus.io/probe: "true"
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  selector:
    matchLabels:
      app: backend
  revisionHistoryLimit: 2
  replicas: 5
  strategy:
    rollingUpdate:
      maxSurge: 4
      maxUnavailable: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/samudai/backend:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          ports:
            - containerPort: 8080
              name: backend
          resources:
            limits:
              cpu: 500m
          env:
            - name: GIN_MODE
              value: release
            - name: SERVICE_NAME
              value: backend
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATABASE_URL_DAO
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-dao
            - name: DATABASE_URL_MEMBER
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-member
            - name: DATABASE_URL_POINT
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-point
            - name: DATABASE_URL_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-project
            - name: DATABASE_URL_DASHBOARD
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-dashboard
            - name: DATABASE_URL_DISCOVERY
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-discovery
            - name: DATABASE_URL_DISCUSSION
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-discussion
            - name: DATABASE_URL_JOB
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: pg-url-job
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: mongo-database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: redis-database-url
            - name: MQ_IP
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: mq-ip
            - name: MQ_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: mq-username
            - name: MQ_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: mq-password
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: github-webhook-secret
            - name: DISCORD_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: discord-client-id
            - name: DISCORD_CLIENT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: backend
                  key: discord-client-secret
            # Inter-module HTTP calls resolve back to this same service via prefixes.
            - name: SERVICE_POINT
              value: http://backend/point
            - name: SERVICE_MEMBER
              value: http://backend/member
            - name: SERVICE_DAO
              value: http://backend/dao
            - name: SERVICE_DISCORD
              value: http://backend/discord
            - name: ELASTIC_APM_SERVICE_NAME
              value: backend
            - name: ELASTIC_APM_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: elastic
                  key: elastic-apm-server-url
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                configMapKeyRef:
                  name: elastic
                  key: elastic-apm-sercret-token
            - name: ELASTIC_APM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: elastic
                  key: elastic-apm-env
