kind: ConfigMap
apiVersion: v1
metadata:
  name: service-node
  labels:
    app: service-node
data:
  # Shared Mongo client; activity/twitter/web3 select their DB via useDb, and
  # the x module uses the native driver with dynamic database selection.
  mongo-database-url: mongodb://$(MONGO_INITDB_ROOT_USERNAME):$(MONGO_INITDB_ROOT_PASSWORD)@mongodb-service.default.svc.cluster.local:27017/?authSource=admin
  redis-database-url: redis://:$(REDIS_PASSWORD)@redis-service.default.svc.cluster.local:6379
  mq-ip: rabbitmq-service.default.svc.cluster.local
  mq-username: $(RABBITMQ_DEFAULT_USER)
  mq-password: $(RABBITMQ_DEFAULT_PASS)
---
apiVersion: v1
kind: Service
metadata:
  name: service-node
  labels:
    app: service-node
  annotations:
    prometheus.io/probe: "true"
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  selector:
    app: service-node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-node
spec:
  selector:
    matchLabels:
      app: service-node
  revisionHistoryLimit: 2
  replicas: 3
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: service-node
    spec:
      containers:
        - name: service-node
          image: ghcr.io/samudai/service-node:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          ports:
            - containerPort: 8080
              name: service-node
          resources:
            limits:
              cpu: 100m
          env:
            - name: SERVICE_NAME
              value: service-node
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: service-node
                  key: mongo-database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: service-node
                  key: redis-database-url
            - name: MQ_IP
              valueFrom:
                configMapKeyRef:
                  name: service-node
                  key: mq-ip
            - name: MQ_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: service-node
                  key: mq-username
            - name: MQ_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: service-node
                  key: mq-password
            - name: SERVICE_POINT
              value: http://backend/point
            - name: ELASTIC_APM_SERVICE_NAME
              value: service-node
            - name: ELASTIC_APM_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: elastic
                  key: elastic-apm-server-url
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                configMapKeyRef:
                  name: elastic
                  key: elastic-apm-sercret-token
            - name: ELASTIC_APM_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: elastic
                  key: elastic-apm-env
