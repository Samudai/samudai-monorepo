# Production overlay for a single-VM deploy. Layers on top of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --pull always
#
# Differences vs local:
#  - app services run prebuilt CI images from ghcr.io instead of building here
#  - everything restarts unless explicitly stopped
#  - Caddy terminates TLS (automatic Let's Encrypt) and routes the public domains
#  - host ports for the apps are NOT published; only Caddy is exposed (80/443)
#
# Secrets/config come from .env (copy .env.prod.example). The data stores and the
# one-shot `migrate` service are inherited unchanged from docker-compose.yml, so
# schema is applied on first deploy exactly as it is locally.

services:
  backend:
    image: ghcr.io/samudai/backend:latest
    pull_policy: always
    restart: unless-stopped
    ports: !reset []

  service-node:
    image: ghcr.io/samudai/service-node:latest
    pull_policy: always
    restart: unless-stopped
    ports: !reset []

  gateway-consumer-node:
    image: ghcr.io/samudai/gateway-consumer-node:latest
    pull_policy: always
    restart: unless-stopped
    ports: !reset []

  service-notification:
    image: ghcr.io/samudai/service-notification:latest
    pull_policy: always
    restart: unless-stopped
    ports: !reset []

  frontend:
    image: ghcr.io/samudai/dashboard-samudai:latest
    pull_policy: always
    restart: unless-stopped
    ports: !reset []

  samudai-bot:
    image: ghcr.io/samudai/samudai-bot:latest
    pull_policy: always
    restart: unless-stopped

  telegram-bot:
    image: ghcr.io/samudai/telegram-bot:latest
    pull_policy: always
    restart: unless-stopped

  # Data stores: durable, and NOT published to the host — they're reachable only
  # on the internal compose network by service name. Avoids exposing databases on
  # a public VM.
  postgres:
    restart: unless-stopped
    ports: !reset []
  mongo:
    restart: unless-stopped
    ports: !reset []
  redis:
    restart: unless-stopped
    ports: !reset []
  rabbitmq:
    restart: unless-stopped
    ports: !reset []

  # Reverse proxy + automatic HTTPS for the public domains.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      backend: { condition: service_started }
      frontend: { condition: service_started }
      gateway-consumer-node: { condition: service_started }
      service-notification: { condition: service_started }

volumes:
  caddydata:
  caddyconfig:
